# Nginx site config for tarajuvva.com (Lightsail / Ubuntu)
# Install: sudo cp deploy/nginx/tarajuvva.conf /etc/nginx/sites-available/default
#          sudo nginx -t && sudo systemctl reload nginx
# SSL:     sudo certbot --nginx -d tarajuvva.com -d www.tarajuvva.com

server {
    listen 443 ssl http2;
    server_name tarajuvva.com www.tarajuvva.com;

    # Canonical host: always use apex domain
    if ($host = www.tarajuvva.com) {
        return 301 https://tarajuvva.com$request_uri;
    }

    # Match Express JSON limit; product saves use multipart (up to 12 × 6MB images).
    client_max_body_size 80M;

    root /var/www/html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/tarajuvva.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tarajuvva.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /uploads/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        client_max_body_size 80M;
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri /index.html;
    }
}

server {
    listen 80;
    server_name tarajuvva.com www.tarajuvva.com;
    return 301 https://tarajuvva.com$request_uri;
}
